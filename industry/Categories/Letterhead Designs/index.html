    <style>
        /* Specific Styles for Coming Soon Page */
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            display: flex;
            flex-direction: column; /* Added to support the logo at the top */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Branded Background Glow */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: #8E6BCB;
            filter: blur(150px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.1;
        }

        .brand-header {
            position: absolute;
            top: 40px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .brand-header span {
            color: #8E6BCB;
        }

        .coming-soon-container {
            padding: 20px;
            max-width: 600px;
            z-index: 1;
        }

        .icon-box {
            font-size: 4rem;
            color: #8E6BCB;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #8E6BCB);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #b0b0b0;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-back {
            background: #8E6BCB;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
            border: 2px solid transparent;
        }

        .btn-back:hover {
            background: transparent;
            border-color: #8E6BCB;
            box-shadow: 0 0 20px rgba(142, 107, 203, 0.4);
            transform: translateY(-2px);
        }

        .social-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
        }

        .social-links a {
            color: #666;
            margin: 0 15px;
            font-size: 1.5rem;
            transition: 0.3s;
        }

        .social-links a:hover {
            color: #8E6BCB;
            transform: scale(1.1);
        }
    </style>
